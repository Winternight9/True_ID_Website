version: 2.1

jobs:
  test-node:
    docker:
      - image: cimg/node:lts
    resource_class: large
    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-v1-{{ arch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ arch }}-

      - run:
          name: Install NPM packages
          command: npm ci

      - save_cache:
          key: npm-v1-{{ arch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Install Playwright Chromium
          command: npx playwright install --with-deps chromium

      - run:
          name: Record runner network context
          command: |
            mkdir -p test-results
            node - <<'NODE'
            const fs = require('fs');
            const path = require('path');

            async function main() {
              let publicIp = 'unknown';
              try {
                const res = await fetch('https://api.ipify.org?format=json');
                publicIp = (await res.json()).ip || publicIp;
              } catch {}

              const data = {
                publicIp,
                runnerName: process.env.CIRCLE_JOB || '',
                runnerOs: 'linux',
                runnerArch: process.arch,
                circleBuildNum: process.env.CIRCLE_BUILD_NUM || '',
                circleWorkflowId: process.env.CIRCLE_WORKFLOW_ID || '',
                circleProjectUsername: process.env.CIRCLE_PROJECT_USERNAME || '',
                circleProjectReponame: process.env.CIRCLE_PROJECT_REPONAME || '',
                capturedAt: new Date().toISOString(),
              };
              fs.writeFileSync(
                path.resolve('test-results/runner-network.json'),
                JSON.stringify(data, null, 2)
              );
              console.log(JSON.stringify(data, null, 2));
            }

            main();
            NODE

      - run:
          name: Run Playwright tests
          command: |
            mkdir -p test-results
            set +e
            npx playwright test --workers=1
            status=$?
            echo "$status" > test-results/circleci-test-exit-code.txt
            exit 0

      - run:
          name: Write test case summary
          command: node scripts/generate-step-summary.js > test-results/summary.md
          when: always

      - run:
          name: Send Discord report
          command: node scripts/send-discord-report.js
          when: always

      - store_artifacts:
          path: playwright-report
          destination: playwright-report

      - store_artifacts:
          path: test-results
          destination: test-results

      - run:
          name: Fail job if tests failed
          command: |
            status="$(cat test-results/circleci-test-exit-code.txt 2>/dev/null || echo 1)"
            exit "$status"
          when: always

workflows:
  build-and-test:
    jobs:
      - test-node
