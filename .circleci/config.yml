version: 2.1

jobs:
  test-node:
    docker:
      - image: cimg/node:lts
    resource_class: large
    steps:
      - checkout

      - restore_cache:
          keys:
            - npm-v1-{{ arch }}-{{ checksum "package-lock.json" }}
            - npm-v1-{{ arch }}-

      - run:
          name: Install NPM packages
          command: npm ci

      - save_cache:
          key: npm-v1-{{ arch }}-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

      - run:
          name: Install Playwright Chromium
          command: npx playwright install --with-deps chromium

      - run:
          name: Record runner network context
          command: node scripts/record-runner-network.js

      - run:
          name: Run Playwright tests
          command: |
            mkdir -p test-results
            set +e
            npx playwright test --workers=1
            status=$?
            echo "$status" > test-results/circleci-test-exit-code.txt
            exit 0

      - run:
          name: Write test case summary
          command: node scripts/generate-step-summary.js > test-results/summary.md
          when: always

      - run:
          name: Send Discord report
          command: node scripts/send-discord-report.js
          when: always

      - store_artifacts:
          path: playwright-report
          destination: playwright-report

      - store_artifacts:
          path: test-results
          destination: test-results

      - run:
          name: Fail job if tests failed
          command: |
            status="$(cat test-results/circleci-test-exit-code.txt 2>/dev/null || echo 1)"
            exit "$status"
          when: always

workflows:
  build-and-test:
    jobs:
      - test-node
